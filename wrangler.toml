name = "cloudflaresub"
main = "src/worker.js"
compatibility_date = "2026-03-06"
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/sub/*"]

# KV binding – the actual namespace ID is set per-environment in the Cloudflare dashboard.
# For local dev (`wrangler dev`), wrangler auto-creates a local KV store.
[[kv_namespaces]]
binding = "SUB_STORE"
id = "67434648dfc843019eeeb2db62f7b309"
